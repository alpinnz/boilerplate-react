name: Frontend Quality Gates

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install

      - name: Boundary checks
        run: corepack yarn check:boundaries

      - name: Circular dependency checks
        run: corepack yarn check:cycles

      - name: Lint
        run: corepack yarn lint

      - name: Typecheck
        run: corepack yarn typecheck

      - name: Test
        run: corepack yarn test

      - name: Build
        run: corepack yarn build
